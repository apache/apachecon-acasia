github:
  description: "Community Over Code Asia - Asia edition of the flagship ASF conference"
  homepage: https://asia.communityovercode.org
  labels:
    - apache
    - community-over-code
    - conference
  features:
    # Enable issues management
    issues: true
    # Enable projects for project management boards
    projects: false
    # Disable wiki for documentation
    wiki: false

  enabled_merge_buttons:
    # enable squash button:
    squash: true
    # default commit message when merging with a squash commit
    # can either be: DEFAULT | PR_TITLE | PR_TITLE_AND_COMMIT_DETAILS | PR_TITLE_AND_DESC
    squash_commit_message: PR_TITLE
    # disable merge button:
    merge: false
    # default commit message when merging with a merge commit
    # can either be: DEFAULT | PR_TITLE | PR_TITLE_AND_DESC
    merge_commit_message: PR_TITLE_AND_DESC
    # disable rebase button:
    rebase: false

  rulesets:
    - name: "Default Branch Protection"
      type: branch
      branches:
        includes:
          - "~DEFAULT_BRANCH"
          - "release/*"
          - "rel/*"
        excludes: []
      bypass_teams:
        - root
      restrict_deletion: true
      restrict_force_push: true
staging:
  profile: acasia
  whoami: gh-pages
