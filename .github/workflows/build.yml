name: Build docs

on:
  push:
    branches: ['exp', 'master']
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 🗂 Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: true
      - name: 📚 Install Hugo
        uses: peaceiris/actions-hugo@16361eb4acea8698b220b76c0d4e84e1fd22c61d  # v2.6.0
        with:
          hugo-version: '0.159.1' # need to use this version to build the website
          extended: true
      - name: 🗂 Checkout gh-pages branch with minimum depth
        uses: actions/checkout@v4
        if: ${{ github.event_name == 'push' }}
        with:
          ref: gh-pages
          fetch-depth: 1
          path: dist
      - name: 🔧 Build site
        run: |
          env HUGO_ENV="production" hugo -F
      - name: 👷 Cleanup dist directory except .git, 2024,2025 and CNAME (each fork can have its own CNAME)
        if: ${{ github.event_name == 'push' }}
        run: find ./dist -mindepth 1 ! -path ./dist/CNAME ! -path './dist/.git*' ! -path './dist/202*' -delete -print
      - name: 👷 Copy ./public/* and ./resources/* and .asf.yaml to /dist/
        if: ${{ github.event_name == 'push' }}
        run: |
          cp -r ./public/* ./dist/
          cp -r ./resources/* ./dist/
          # The asf.yaml file must be in the branch from which the files are published.
          # Otherwise, ASF publishing tools cannot detect it.
          cp .asf.yaml ./dist/
         
      - name: 🚀 Add commit to the gh-pages branch and deploy it
        if: ${{ github.event_name == 'push' }}
        working-directory: dist
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@users.noreply.github.com"
          git add .
          git diff-index --quiet HEAD || git commit -m "Regenerated website based on ${GITHUB_SHA} commit"
          git push origin gh-pages
      
     
